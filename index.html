<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEED — チーム進捗ツール</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --accent:       #22C55E;
      --accent-dark:  #16A34A;
      --accent-light: #DCFCE7;
      --accent-ring:  #22C55E44;
      --accent-text:  #15803D;
      --logo-fill:    #22C55E;
      --card-shadow:  0 2px 16px rgba(34,197,94,0.10);
      --card-radius:  16px;
      --card-border:  none;
      --card-bg:      #FFFFFF;
      --app-bg:       #F0FDF4;
      --card-pad:     20px 24px;
      --gap:          16px;
      --header-h:     64px;
      --sidebar-pad:  16px 12px;
      --main-pad:     28px 32px;
      --font-sz:      14px;
      --title-sz:     24px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--app-bg); font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif; -webkit-font-smoothing: antialiased; font-size: var(--font-sz); }
    input, select, textarea, button { font-family: inherit; }
    button { transition: opacity 0.15s, border-color 0.2s, background 0.2s; }
    button:hover { opacity: 0.85; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 9999px; }
    input[type="range"] { cursor: pointer; accent-color: var(--accent); }
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr !important; }
      .grid-4 { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 480px) {
      .grid-4 { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 1. Supabase SDK（CDNから読み込み） -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- 2. Supabase 接続設定（env.js に URL と KEY を入力してください） -->
  <script src="env.js"></script>
  <!-- 3. Data & Storage (plain JS) -->
  <script src="data.js"></script>

  <!-- 2. UI Components -->
  <script type="text/babel" src="ui-components.jsx"></script>

  <!-- 3. Layout -->
  <script type="text/babel" src="layout.jsx"></script>

  <!-- 4. Pages -->
  <script type="text/babel" src="page-name-select.jsx"></script>
  <script type="text/babel" src="page-dashboard.jsx"></script>
  <script type="text/babel" src="page-my-tasks.jsx"></script>
  <script type="text/babel" src="page-workflow.jsx"></script>
  <script type="text/babel" src="page-task-create.jsx"></script>
  <script type="text/babel" src="page-settings.jsx"></script>

  <!-- 5. Tweaks Panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks-config.jsx"></script>

  <!-- 6. App (bootstraps React) -->
  <script type="text/babel" src="app.jsx"></script>

  <script>
    initStorage();
  </script>
</body>
</html>
